<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>My Todo App</title>

  <style>
    body {
      background: #0f172a;
      color: white;
      font-family: Arial;
      text-align: center;
    }

    h1 {
      font-size: 28px;
    }

    input {
      width: 70%;
      padding: 12px;
      border-radius: 10px;
      border: none;
    }

    button {
      padding: 15px;
      font-size: 16px;
      border-radius: 10px;
      border: none;
      background: #3b82f6;
      color: white;
      margin: 5px;
    }

    li {
      margin: 10px;
      list-style: none;
      background: #1e293b;
      padding: 10px;
      border-radius: 10px;
    }

    .checked {
      text-decoration: line-through;
      opacity: 0.6;
    }
  </style>
</head>

<body>

  <h1>My Todo App 🚀</h1>

  <input id="input-box" placeholder="やること入力">
  <button onclick="addTask()">追加</button>

  <ul id="list-container"></ul>

  <script>
    const inputBox = document.getElementById("input-box");
    const listContainer = document.getElementById("list-container");

    function addTask() {
      if (inputBox.value === '') return;

      let li = document.createElement("li");
      li.innerHTML = inputBox.value;

      // チェック（線つける）
      li.addEventListener("click", function() {
        li.classList.toggle("checked");
      });

      // 削除ボタン
      let btn = document.createElement("button");
      btn.innerHTML = "削除";

      btn.onclick = function(event) {
        event.stopPropagation();
        li.remove();
      };

      li.appendChild(btn);
      listContainer.appendChild(li);
      inputBox.value = "";
    }
  </script>

</body>
</html>
